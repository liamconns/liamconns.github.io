    So far during my time at KU I have learned many key skills that will be used through my career such as teamwork and working to tight deadlines. I have thouroughly enjoyed my time at the university and I am excited to continue the rest of my education. 
    
    As of now I have completed two programming courses in C++ including a data structures and algorithms course. I am currently enrolled in a third programming course that deals with Javascript and Haskell as well as an embedded systems course and a discrete mathematics course.
    
    Outside of my academics I am involved in a variety of clubs such as the KU chapter of the Association for Computing Machinery (ACM), programming club, investment club, and cornhole club.
