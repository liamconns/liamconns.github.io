- layout: top-middle
  name: Spotify Data Collector
  link: https://github.com/liamconns/spotify-number-crunch
  github: liamconns
  quote: >
    This script utilizes Spotify's Web API by using Python's 'Spotipy' library
  description: | # this will include new lines to allow paragraphs
    Using Spotipy, this script my username and uniform resource indicator for one of my playlists to produce a CSV file. This file is filled with every song on the playlist
    along with Spotify's own metrics that include features such as "Loudness," "Acousticness," and "Danceability."

- layout: top-middle
  name: Recurive Navigation
  link: https://github.com/liamconns/Tank-Navigation
  github: liamconns
  quote: >
    Using recursive backtracking, this program navigates a "tank" through an "electric field"
  description: | # this will include new lines to allow paragraphs
    This was by far one of the most fun projects I worked on in school. After reading in a file that features a matrix of +'s and -'s as well as a start and end point, this program maps its
    way through by looking for a route made of alternating +'s and -'s until it has landed on every spot while using backtracking
    to start over when it runs into a dead-end.

